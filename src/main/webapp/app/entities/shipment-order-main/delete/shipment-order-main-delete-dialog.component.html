<form *ngIf="shipmentOrderMain" name="deleteForm" (ngSubmit)="confirmDelete(shipmentOrderMain.id!)">
  <div class="modal-header">
    <h4 class="modal-title" data-cy="shipmentOrderMainDeleteDialogHeading" jhiTranslate="entity.delete.title">Potvrdi brisanje</h4>

    <button type="button" class="btn-close" data-dismiss="modal" aria-hidden="true" (click)="cancel()">&times;</button>
  </div>

  <div class="modal-body">
    <jhi-alert-error></jhi-alert-error>
    <p
      id="jhi-delete-shipmentOrderMain-heading"
      jhiTranslate="shopApp.shipmentOrderMain.delete.question"
      [translateValues]="{ id: shipmentOrderMain.id }"
    >
      Da li ste sigurni da želite da obrišete Shipment Order Main pod nazivom {{ shipmentOrderMain.id }}?
    </p>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
      <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Otkaži</span>
    </button>

    <button id="jhi-confirm-delete-shipmentOrderMain" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
      <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Obriši</span>
    </button>
  </div>
</form>
