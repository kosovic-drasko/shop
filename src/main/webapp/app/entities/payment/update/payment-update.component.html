<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-payment-heading" data-cy="PaymentCreateUpdateHeading" jhiTranslate="shopApp.payment.home.createOrEditLabel">
        Kreirajte ili izmenite Payment
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.name" for="field_name">Name</label>
          <input type="text" class="form-control" name="name" id="field_name" data-cy="name" formControlName="name" />
          <div *ngIf="editForm.get('name')!.invalid && (editForm.get('name')!.dirty || editForm.get('name')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('name')?.errors?.required" jhiTranslate="entity.validation.required">
              Polje je obavezno.
            </small>
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('name')?.errors?.maxlength"
              jhiTranslate="entity.validation.maxlength"
              [translateValues]="{ max: 1000 }"
            >
              Polje ne može biti duže od 1000 karaktera.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.priceNet" for="field_priceNet">Price Net</label>
          <input type="number" class="form-control" name="priceNet" id="field_priceNet" data-cy="priceNet" formControlName="priceNet" />
          <div *ngIf="editForm.get('priceNet')!.invalid && (editForm.get('priceNet')!.dirty || editForm.get('priceNet')!.touched)">
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('priceNet')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              Polje je obavezno.
            </small>
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('priceNet')?.errors?.min"
              jhiTranslate="entity.validation.min"
              [translateValues]="{ min: 0 }"
            >
              Polje mora biti veče od 0.
            </small>
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('priceNet')?.errors?.max"
              jhiTranslate="entity.validation.max"
              [translateValues]="{ max: 10000 }"
            >
              Polje ne sme biti veće od 10000.
            </small>
            <small
              class="form-text text-danger"
              [hidden]="!editForm.get('priceNet')?.errors?.number"
              jhiTranslate="entity.validation.number"
            >
              Polje mora biti broj.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.vat" for="field_vat">Vat</label>
          <input type="number" class="form-control" name="vat" id="field_vat" data-cy="vat" formControlName="vat" />
          <div *ngIf="editForm.get('vat')!.invalid && (editForm.get('vat')!.dirty || editForm.get('vat')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('vat')?.errors?.required" jhiTranslate="entity.validation.required">
              Polje je obavezno.
            </small>
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('vat')?.errors?.min"
              jhiTranslate="entity.validation.min"
              [translateValues]="{ min: 0 }"
            >
              Polje mora biti veče od 0.
            </small>
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('vat')?.errors?.max"
              jhiTranslate="entity.validation.max"
              [translateValues]="{ max: 100 }"
            >
              Polje ne sme biti veće od 100.
            </small>
            <small class="form-text text-danger" [hidden]="!editForm.get('vat')?.errors?.number" jhiTranslate="entity.validation.number">
              Polje mora biti broj.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.priceGross" for="field_priceGross">Price Gross</label>
          <input
            type="number"
            class="form-control"
            name="priceGross"
            id="field_priceGross"
            data-cy="priceGross"
            formControlName="priceGross"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.paymentStatusEnum" for="field_paymentStatusEnum"
            >Payment Status Enum</label
          >
          <select
            class="form-control"
            name="paymentStatusEnum"
            formControlName="paymentStatusEnum"
            id="field_paymentStatusEnum"
            data-cy="paymentStatusEnum"
          >
            <option [ngValue]="null">{{ 'shopApp.PaymentStatusEnum.null' | translate }}</option>
            <option *ngFor="let paymentStatusEnum of paymentStatusEnumValues" [value]="paymentStatusEnum">
              {{ 'shopApp.PaymentStatusEnum.' + paymentStatusEnum | translate }}
            </option>
          </select>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.createTime" for="field_createTime">Create Time</label>
          <div class="d-flex">
            <input
              id="field_createTime"
              data-cy="createTime"
              type="datetime-local"
              class="form-control"
              name="createTime"
              formControlName="createTime"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="shopApp.payment.updateTime" for="field_updateTime">Update Time</label>
          <div class="d-flex">
            <input
              id="field_updateTime"
              data-cy="updateTime"
              type="datetime-local"
              class="form-control"
              name="updateTime"
              formControlName="updateTime"
              placeholder="YYYY-MM-DD HH:mm"
            />
          </div>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Otkaži</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sačuvaj</span>
        </button>
      </div>
    </form>
  </div>
</div>
